name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & unit/property tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (libudev for the profibus serial transport)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
      - name: Unit + integration + property tests
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  flows:
    name: Flow tests (tedge flows test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install thin-edge.io
        run: curl -fsSL https://thin-edge.io/install.sh | sh -s
      - name: Run flow tests
        run: ./flows/test-flows.sh

  fuzz-smoke:
    name: Fuzz smoke (30s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/sdk/fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Fuzz all targets briefly
        working-directory: crates/sdk
        run: |
          for t in decode_primitive config_toml transform sample_envelope; do
            cargo +nightly fuzz run "$t" -- -max_total_time=30
          done

  c-poc:
    name: C PoC (${{ matrix.protocol }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        protocol: [modbus, opcua, canbus, canopen, j1939, profibus]
    steps:
      - uses: actions/checkout@v4
      - name: Install C toolchain + libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config \
            libmodbus-dev libmosquitto-dev libcjson-dev \
            mosquitto mosquitto-clients jq
          # open62541 is built from source by CMake (FetchContent) when no
          # distro package is found, so it is deliberately not installed here.
      - name: Load vcan kernel module (SocketCAN suites)
        if: matrix.protocol == 'canbus' || matrix.protocol == 'canopen' || matrix.protocol == 'j1939'
        run: |
          sudo apt-get install -y linux-modules-extra-$(uname -r)
          sudo modprobe vcan
      - name: Build
        run: |
          cmake -B poc-c/build -S poc-c -G Ninja
          cmake --build poc-c/build
      - name: Golden decode vectors (shared with the Rust SDK)
        run: ctest --test-dir poc-c/build --output-on-failure
      - name: Start MQTT broker
        run: |
          sudo systemctl start mosquitto || mosquitto -d -p 1883
          timeout 10 sh -c 'until nc -z 127.0.0.1 1883; do sleep 0.5; done'
      - name: Start protocol simulator
        run: docker compose -f connectors/${{ matrix.protocol }}/docker-compose.yaml up -d --build --wait simulator
      - name: Smoke test against simulator + broker
        run: ./poc-c/ci/smoke.sh ${{ matrix.protocol }}
      - name: Connector log + simulator log on failure
        if: failure()
        run: docker compose -f connectors/${{ matrix.protocol }}/docker-compose.yaml logs simulator || true

  conformance:
    name: Conformance (${{ matrix.protocol }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        protocol: [modbus, opcua, canbus, canopen, profibus]
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (libudev for the profibus serial transport)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - name: Run conformance suite
        run: just conformance ${{ matrix.protocol }}

  e2e:
    name: e2e (${{ matrix.protocol }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        protocol: [modbus, opcua, canbus, canopen, profibus]
    steps:
      - uses: actions/checkout@v4
      - name: Load vcan kernel module (SocketCAN suites)
        if: matrix.protocol == 'canbus' || matrix.protocol == 'canopen'
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-modules-extra-$(uname -r)
          sudo modprobe vcan
      - uses: extractions/setup-just@v2
      - name: Run e2e suite
        run: just test-e2e ${{ matrix.protocol }}
      - name: Upload robot output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-output-${{ matrix.protocol }}
          path: connectors/${{ matrix.protocol }}/output/
          if-no-files-found: ignore
