# Build and publish the OT protocol simulator containers used by
# demo/docker-compose.yaml to GitHub Container Registry, so users can pull
# prebuilt images instead of building them from the repository.
#
# Images are published as:
#   ghcr.io/<owner>/<repo>/<proto>-sim:latest      (default branch)
#   ghcr.io/<owner>/<repo>/<proto>-sim:<version>   (git tags)
#
# Pull requests that touch a simulator build the image (both platforms) but
# do not push, so breakage is caught before merge.
name: Publish simulators

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    paths:
      - "connectors/*/sim/**"
      - ".github/workflows/publish-simulators.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sim: [modbus, opcua, canbus, canopen, profibus]
    steps:
      - uses: actions/checkout@v4

      # The simulators run on real Linux devices (often ARM), so publish
      # multi-arch images. They are thin Python images, so emulated arm64
      # builds are cheap.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.sim }}-sim
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: connectors/${{ matrix.sim }}/sim/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.sim }}-sim
          cache-to: type=gha,mode=max,scope=${{ matrix.sim }}-sim
