# Modbus connector configuration for the full Cumulocity end-to-end harness.
#
# The connector runs inside the tedge container, talks to the local MQTT broker
# (127.0.0.1:1883) and reads the pymodbus simulator over TCP (service "simulator").
# Points map onto the values baked into connectors/modbus/sim/modbus.json:
#
#   holding 3      -> uint16  17001   (read/write -> c8y_SetRegister round-trip)
#   holding 4..5   -> uint32  617001
#   holding 6..7   -> float32 404.17
#   coil    48     -> bool    false   (read/write -> c8y_SetCoil round-trip)
#   holding 1      -> flagged invalid -> read yields quality "bad"

[connector]
protocol      = "modbus"
service_name  = "tedge-dot"
poll_interval = "2s"
log_level     = "info"

[mqtt]
host = "127.0.0.1"
port = 1883

[[device]]
name             = "plc1"
protocol_address = { transport = "tcp", host = "simulator", port = 502, unit_id = 1 }
default_mode     = "typed"

  [[device.point]]
  id       = "temp_u16"
  datatype = "uint16"
  access   = "read_write"
  address  = { table = "holding", address = 3, count = 1 }

  [[device.point]]
  id       = "count_u32"
  datatype = "uint32"
  address  = { table = "holding", address = 4, count = 2 }

  [[device.point]]
  id       = "level_f32"
  datatype = "float32"
  address  = { table = "holding", address = 6, count = 2 }

  [[device.point]]
  id       = "bad_point"
  datatype = "uint16"
  address  = { table = "holding", address = 1, count = 1 }

  [[device.point]]
  id       = "coil_rw"
  datatype = "bool"
  access   = "read_write"
  address  = { table = "coil", address = 48, count = 1 }
