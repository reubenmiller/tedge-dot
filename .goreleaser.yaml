# goreleaser configuration for tedge-dot.
# Docs: https://goreleaser.com
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - rustup default stable
    - cargo install --locked cargo-zigbuild
    - cargo fetch --locked

builds:
  - builder: rust
    flags:
      - --release
      - --package=tedge-dot
      # Compile the cross-compilable protocol modules into the single binary so
      # one service can run modbus, opcua, canbus and canopen connectors.
      #
      # profibus is deliberately excluded: its serial dependency (serialport via
      # profirust) has a native libudev build script that does not cross-compile
      # with cargo-zigbuild. Build from source on Linux with
      # `cargo build --features profibus` to use it.
      - --features=modbus,opcua,canbus,canopen
    targets:
      - x86_64-unknown-linux-gnu
      - x86_64-apple-darwin
      - x86_64-pc-windows-gnu
      - aarch64-unknown-linux-gnu
      - aarch64-apple-darwin

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - id: linux
    maintainer: thin-edge.io <info@thin-edge.io>
    description: "thin-edge.io OT protocol connectors (Modbus, OPC UA, CAN bus, CANopen)"
    homepage: "https://github.com/thin-edge/tedge-dot"
    section: "default"
    priority: "extra"
    license: "Apache-2.0"
    formats:
      - deb
      - rpm
      - apk
    # Runtime helpers the supervisor relies on:
    #   socat     - PROFIBUS serial<->TCP bridge
    #   iproute2  - bring up the vcan0 virtual CAN interface (canbus/canopen)
    dependencies:
      - socat
      - iproute2
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh
    contents:
      # Supervisor that runs every connector under one systemd service.
      - src: packaging/tedge-dot-supervisor.sh
        dst: /usr/bin/tedge-dot-supervisor
        file_info:
          mode: 0755
          owner: root

      # Default connector configs (no devices configured): the service starts
      # and stays active on a fresh install. Add [[device]] sections (or copy a
      # demo config from /usr/share/tedge-dot/demo/) and restart the service.
      - src: packaging/config/modbus.toml
        dst: /etc/tedge/plugins/ot/modbus.toml
        type: config|noreplace
        file_info: { owner: tedge, group: tedge, mode: 0644 }
      - src: packaging/config/opcua.toml
        dst: /etc/tedge/plugins/ot/opcua.toml
        type: config|noreplace
        file_info: { owner: tedge, group: tedge, mode: 0644 }
      - src: packaging/config/canbus.toml
        dst: /etc/tedge/plugins/ot/canbus.toml
        type: config|noreplace
        file_info: { owner: tedge, group: tedge, mode: 0644 }
      - src: packaging/config/canopen.toml
        dst: /etc/tedge/plugins/ot/canopen.toml
        type: config|noreplace
        file_info: { owner: tedge, group: tedge, mode: 0644 }

      # Demo connector configs (one per OT protocol), paired with the simulators
      # in docker-compose.simulators.yaml. Copy to /etc/tedge/plugins/ot/ to run
      # them (see demo/README.md).
      - src: packaging/demo/ot/modbus.toml
        dst: /usr/share/tedge-dot/demo/modbus.toml
        file_info: { owner: tedge, group: tedge, mode: 0644 }
      - src: packaging/demo/ot/opcua.toml
        dst: /usr/share/tedge-dot/demo/opcua.toml
        file_info: { owner: tedge, group: tedge, mode: 0644 }
      - src: packaging/demo/ot/canbus.toml
        dst: /usr/share/tedge-dot/demo/canbus.toml
        file_info: { owner: tedge, group: tedge, mode: 0644 }
      - src: packaging/demo/ot/canopen.toml
        dst: /usr/share/tedge-dot/demo/canopen.toml
        file_info: { owner: tedge, group: tedge, mode: 0644 }

      # DBC database describing the CAN signals the canbus simulator emits.
      - src: connectors/canbus/sim/test.dbc
        dst: /usr/share/tedge-dot/demo/can/test.dbc
        file_info: { owner: tedge, group: tedge, mode: 0644 }

      # SystemD Unit File
      - src: packaging/tedge-dot.service
        dst: /lib/systemd/system/tedge-dot.service
        file_info:
          mode: 0644
          owner: root

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
