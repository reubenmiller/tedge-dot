# Conformance manifest for the CANopen connector.
#
#   cargo run -p ot-conformance -- check --spec connectors/canopen/conformance.toml
#
# Runs the static layers (schema examples, golden decode vectors, manifest ↔ compiled
# capability agreement). The declared simulator is the Dockerised vcan stack (python-canopen
# SDO server on vcan0, node ID 1) — SocketCAN only exists on Linux, so the harness has no
# built-in implementation for it and skips the behavioural layer (B1-B10); the e2e suite in
# connectors/canopen/tests covers it instead.

[connector]
protocol    = "canopen"
modes       = ["raw", "typed"]
datatypes   = ["bool", "int8", "uint8", "int16", "uint16", "int32", "uint32", "int64", "uint64", "float32", "float64", "string"]
point_kinds = ["object"]
verbs       = ["write"]
features    = []
subscribe   = false

[simulator]
# python-canopen SDO server on vcan0 — served by the Dockerised e2e stack, not built into
# the harness.
kind  = "canopen-vcan"
image = "connectors/canopen/sim"
seed  = "sim/simulator.py"
