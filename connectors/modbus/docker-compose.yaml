# End-to-end harness for the Rust Modbus connector.
#
#   broker     - lightweight MQTT broker (no cloud)
#   simulator  - the existing pymodbus simulator (a real Modbus TCP server)
#   connector  - the Rust tedge-dot reading the simulator and publishing samples
#
# The Robot suite runs on the host and connects to the broker on localhost:1883.
services:
  broker:
    image: eclipse-mosquitto:2
    volumes:
      - ../_shared/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      # Host port 11883 avoids clashing with a local tedge broker on 1883.
      - "11883:1883"

  simulator:
    build:
      context: ../..
      dockerfile: connectors/modbus/sim/Dockerfile
    ports:
      - "5020:502"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  connector:
    build:
      context: ../..
      dockerfile: connectors/modbus/Dockerfile.connector
    depends_on:
      broker:
        condition: service_started
      simulator:
        condition: service_healthy
