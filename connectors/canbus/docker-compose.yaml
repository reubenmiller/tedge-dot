# End-to-end harness for the Rust CAN bus connector.
#
#   broker     - lightweight MQTT broker (no cloud)
#   simulator  - sends periodic CAN frames on vcan0 (virtual CAN interface)
#   connector  - Rust tedge-dot reading vcan0 and publishing samples to broker
#
# Both the simulator and connector use network_mode: host so they share the
# host kernel's vcan0 device.  The broker exposes its port on the host at
# 13883, which both host-networked containers reach via localhost:13883.
#
# !! REQUIREMENTS !!
#   - Linux host (or Linux VM) with CAN support in the kernel:
#       CONFIG_CAN=y or CONFIG_CAN=m
#       CONFIG_CAN_VCAN=y or CONFIG_CAN_VCAN=m
#   - Docker Engine with `--privileged` support (granted below)
#
# On macOS Docker Desktop the LinuxKit VM kernel does NOT include CAN/vcan
# support.  Run the unit + integration tests instead:
#   cargo test -p connector-canbus
#
# The Robot suite runs on the host and connects to localhost:13883.

services:
  broker:
    image: eclipse-mosquitto:2
    volumes:
      - ../_shared/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      # Host port 13883 avoids clashing with other connector e2e stacks.
      - "13883:1883"

  simulator:
    build:
      context: ../..
      dockerfile: connectors/canbus/sim/Dockerfile
    # Share the host network namespace so vcan0 is visible to the connector.
    network_mode: host
    # privileged is required to load the vcan kernel module via modprobe.
    privileged: true
    depends_on:
      broker:
        condition: service_started
    # Health check: vcan0 is up and the simulator process is running.
    healthcheck:
      test: ["CMD", "ip", "link", "show", "vcan0"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  connector:
    build:
      context: ../..
      dockerfile: connectors/canbus/Dockerfile.connector
    network_mode: host
    privileged: true
    depends_on:
      broker:
        condition: service_started
      simulator:
        condition: service_healthy
