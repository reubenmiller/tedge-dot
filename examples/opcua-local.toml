# OPC-UA connector config for LOCAL exploration on your machine.
#
# Pairs with the asyncua simulator started by `just sim-opcua`, which advertises
# its endpoint as opc.tcp://127.0.0.1:4840/ (OPCUA_ENDPOINT_HOST=127.0.0.1).
#
# NOTE: the connector follows the server's ADVERTISED endpoint URL, so the sim must
# advertise 127.0.0.1 (not a docker service name) to be reachable from the host.
#
# The points map onto the nodes exposed by simulator/server.py (namespace index 2):
#
#   ns=2;s=Temperature   -> float64 21.5
#   ns=2;s=Count         -> uint32  617001
#   ns=2;s=Setpoint      -> int32   0      (read/write round-trip)
#   ns=2;s=Running       -> bool    false  (read/write round-trip)
#   ns=2;s=DoesNotExist  -> read returns a Bad status -> quality "bad"
#
# Try it (after `just sim-opcua`):
#   cargo run -- read  -c examples/opcua-local.toml -d opc1 -p temperature -p count_u32 --json
#   cargo run -- write -c examples/opcua-local.toml -d opc1 -p setpoint --value 42
#   cargo run -- write -c examples/opcua-local.toml -d opc1 -p running  --value true
#   cargo run -- read  -c examples/opcua-local.toml -d opc1 -p bad_point   # exits 1 (bad quality)
#
# With security_policy = "None" no client certificate is needed. The connector silences
# async-opcua's spurious "missing application instance certificate" logs by default; set
# RUST_LOG (e.g. RUST_LOG=info) to see the full OPC-UA client logging.

[connector]
protocol      = "opcua"
service_name  = "tedge-dot"
poll_interval = "1s"
log_level     = "info"

[mqtt]
host = "127.0.0.1"
port = 1883

[connection]
application_name = "tedge-dot"
security_policy  = "None"
security_mode    = "none"

[[device]]
name             = "opc1"
protocol_address = { endpoint = "opc.tcp://127.0.0.1:4840/", security_policy = "None", security_mode = "none" }
default_mode     = "typed"

  [[device.point]]
  id       = "temperature"
  datatype = "float64"
  unit     = "°C"
  address  = { node_id = "ns=2;s=Temperature" }

  [[device.point]]
  id       = "count_u32"
  datatype = "uint32"
  address  = { node_id = "ns=2;s=Count" }

  # Int32 used for the numeric write round-trip.
  [[device.point]]
  id       = "setpoint"
  datatype = "int32"
  access   = "read_write"
  address  = { node_id = "ns=2;s=Setpoint" }

  # Boolean used for the boolean write round-trip.
  [[device.point]]
  id       = "running"
  datatype = "bool"
  access   = "read_write"
  address  = { node_id = "ns=2;s=Running" }

  # Reading this node returns a Bad status -> quality "bad".
  [[device.point]]
  id       = "bad_point"
  datatype = "uint16"
  address  = { node_id = "ns=2;s=DoesNotExist" }
