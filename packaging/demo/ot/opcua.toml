# Demo OPC-UA connector config — pairs with the opcua-sim service in
# docker-compose.simulators.yaml (python-asyncua on 127.0.0.1:4840).
#
# Installed to /etc/tedge/plugins/ot/opcua.toml and launched automatically by
# the tedge-dot supervisor.  Publishes to 127.0.0.1:1883.

[connector]
protocol      = "opcua"
service_name  = "tedge-opcua-plugin"
poll_interval = "2s"
log_level     = "info"

[mqtt]
host = "127.0.0.1"
port = 1883

[connection]
application_name  = "tedge-dot"
security_policy   = "None"
security_mode     = "none"
connect_timeout_s = 10

[[device]]
name             = "opc1"
protocol_address = { endpoint = "opc.tcp://127.0.0.1:4840/", security_policy = "None", security_mode = "none" }
default_mode     = "typed"

  [[device.point]]
  id       = "temperature"
  datatype = "float64"
  unit     = "°C"
  address  = { node_id = "ns=2;s=Temperature" }

  [[device.point]]
  id       = "count_u32"
  datatype = "uint32"
  address  = { node_id = "ns=2;s=Count" }

  [[device.point]]
  id       = "setpoint"
  datatype = "int32"
  access   = "read_write"
  address  = { node_id = "ns=2;s=Setpoint" }

  [[device.point]]
  id       = "running"
  datatype = "bool"
  access   = "read_write"
  address  = { node_id = "ns=2;s=Running" }
