# Demo Modbus connector config — pairs with the modbus-sim service in
# docker-compose.simulators.yaml (pymodbus on 127.0.0.1:502).
#
# Installed to /etc/tedge/plugins/ot/modbus.toml and launched automatically by
# the tedge-dot supervisor (tedge-dot.service).  Publishes to the thin-edge.io
# mosquitto broker on 127.0.0.1:1883.

[connector]
protocol      = "modbus"
service_name  = "tedge-modbus-plugin"
poll_interval = "2s"
log_level     = "info"

[mqtt]
host = "127.0.0.1"
port = 1883

[connection.serial]
baudrate = 9600
parity   = "N"
stopbits = 2
databits = 8

[[device]]
name             = "plc1"
protocol_address = { transport = "tcp", host = "127.0.0.1", port = 502, unit_id = 1 }
default_mode     = "typed"

  [[device.point]]
  id       = "temp_u16"
  datatype = "uint16"
  access   = "read_write"
  address  = { table = "holding", address = 3, count = 1 }

  [[device.point]]
  id       = "count_u32"
  datatype = "uint32"
  address  = { table = "holding", address = 4, count = 2 }

  [[device.point]]
  id       = "level_f32"
  datatype = "float32"
  address  = { table = "holding", address = 6, count = 2 }

  [[device.point]]
  id       = "coil_rw"
  datatype = "bool"
  access   = "read_write"
  address  = { table = "coil", address = 48, count = 1 }
