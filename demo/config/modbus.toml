# Demo Modbus connector config — pairs with the pymodbus simulator
# (modbus-sim in ../docker-compose.yaml, or `just sim modbus`), which maps the
# container's port 502 to host port 5020.
#
# Two ways to use it:
#
#   * Local exploration, no broker needed — the read/write CLI ignores [mqtt]:
#       cargo run -- read  -c demo/config/modbus.toml                        # all readable points, once
#       cargo run -- read  -c demo/config/modbus.toml -p 'temp_*' --poll     # keep polling (Ctrl-C stops)
#       cargo run -- write -c demo/config/modbus.toml -d plc1 -p coil_rw --value true
#       cargo run -- read  -c demo/config/modbus.toml -d plc1 -p bad_point   # exits 1 (bad quality)
#       cargo run -- run   -c demo/config/modbus.toml --output stdout        # sample JSON lines on stdout
#
#   * Installed demo — ships with the tedge-dot package in /usr/share/tedge-dot/demo/.
#     Copy it to /etc/tedge/plugins/ot/ and restart tedge-dot.service to run it
#     against the simulator. Publishes to the thin-edge.io broker on 127.0.0.1:1883.
#
# The points map onto the values seeded in connectors/modbus/sim/modbus.json
# (shared address space):
#
#   holding 3      -> uint16  17001
#   holding 4..5   -> uint32  617001
#   holding 6..7   -> float32 404.17
#   coil    48     -> bool    false (initially)
#   holding 1      -> flagged "invalid" -> read raises a Modbus exception (bad quality)

[connector]
protocol      = "modbus"
service_name  = "tedge-dot-modbus"
poll_interval = "2s"
log_level     = "info"

[mqtt]
host = "127.0.0.1"
port = 1883

[connection.serial]
baudrate = 9600
parity   = "N"
stopbits = 2
databits = 8

[[device]]
name             = "plc1"
protocol_address = { transport = "tcp", host = "127.0.0.1", port = 5020, unit_id = 1 }
default_mode     = "typed"

  # uint16 holding register (also used for the register write round-trip).
  [[device.point]]
  id       = "temp_u16"
  datatype = "uint16"
  access   = "read_write"
  address  = { table = "holding", address = 3, count = 1 }

  # Same register, but with a per-point linear transform applied by the connector:
  # (17001 * 10^-3) + 0 = 17.001. Scaling is a property of the signal, not the flow.
  # The free-form `meta` table is echoed verbatim in every sample envelope; flows read it for
  # per-signal behaviour (ot-measurement honours on_change / deadband / min_interval / debounce).
  [[device.point]]
  id        = "temp_scaled"
  datatype  = "uint16"
  address   = { table = "holding", address = 3, count = 1 }
  transform = { decimal_shift = -3 }
  unit      = "°C"
  meta      = { on_change = true, deadband = 0.5, min_interval = "10s" }

  # uint32 across two registers.
  [[device.point]]
  id       = "count_u32"
  datatype = "uint32"
  address  = { table = "holding", address = 4, count = 2 }

  # float32 across two registers.
  [[device.point]]
  id       = "level_f32"
  datatype = "float32"
  address  = { table = "holding", address = 6, count = 2 }

  # Reading this address makes the simulator return an exception -> quality "bad"
  # (kept in the demo deliberately, to show quality propagation end to end).
  [[device.point]]
  id       = "bad_point"
  datatype = "uint16"
  address  = { table = "holding", address = 1, count = 1 }

  # Coil used for the boolean write round-trip.
  [[device.point]]
  id       = "coil_rw"
  datatype = "bool"
  access   = "read_write"
  address  = { table = "coil", address = 48, count = 1 }
